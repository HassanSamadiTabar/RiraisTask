syntax = "proto3";

import "google/protobuf/empty.proto";

option csharp_namespace = "RiraisTask.Protos";

package person;

// PeopleService manages person records (CRUD + paginated list).
service PeopleService {
  rpc CreatePerson (CreatePersonRequest) returns (PersonDto);
  rpc GetPerson    (GetPersonRequest)    returns (PersonDto);
  rpc GetAllPeople (GetAllPeopleRequest) returns (GetAllPeopleResponse);
  rpc UpdatePerson (UpdatePersonRequest) returns (PersonDto);
  rpc DeletePerson (DeletePersonRequest) returns (google.protobuf.Empty);
}

message PersonDto {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string national_code = 4;
  string birth_date = 5; // yyyy-MM-dd
  bytes row_version = 6; // required for optimistic concurrency on update
}

message CreatePersonRequest {
  string first_name = 1;
  string last_name = 2;
  string national_code = 3;
  string birth_date = 4; // yyyy-MM-dd
}

message UpdatePersonRequest {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string national_code = 4;
  string birth_date = 5; // yyyy-MM-dd
  bytes row_version = 6;
}

message GetPersonRequest {
  string id = 1;
}

message GetAllPeopleRequest {
  int32 page = 1;       // 1-based; defaults to 1 when omitted or <= 0
  int32 page_size = 2;  // defaults to 50; max 200
  string search = 3;    // optional filter on first name, last name, or national code
}

message GetAllPeopleResponse {
  repeated PersonDto people = 1;
  int32 total_count = 2;
}

message DeletePersonRequest {
  string id = 1;
}
